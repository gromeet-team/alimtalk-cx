<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메아리셋 12주 알림톡 CRM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #faf8f5;
    color: #1a1a1a;
    line-height: 1.6;
  }

  .header {
    background: linear-gradient(135deg, #D4540A 0%, #FF6B35 60%, #FF9F6B 100%);
    color: white;
    padding: 48px 40px;
    text-align: center;
  }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .header p { font-size: 15px; opacity: 0.9; }

  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  /* Overview Cards */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .overview-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .overview-card .num { font-size: 28px; font-weight: 700; color: #FF6B35; }
  .overview-card .label { font-size: 13px; color: #666; margin-top: 4px; }

  /* Decision summary inline */
  .decision-overview {
    background: white;
    border-radius: 12px;
    padding: 16px 24px;
    margin-bottom: 32px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .decision-overview .label { font-weight: 600; color: #333; font-size: 14px; }
  .decision-overview .counts { display: flex; gap: 16px; }
  .decision-overview .counts span { font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #22c55e; }
  .dot.blue { background: #3b82f6; }
  .dot.gray { background: #9ca3af; }

  /* Controls bar */
  .controls-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .controls-bar button {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls-bar button:hover { background: #fff3ec; border-color: #FF6B35; }

  /* CRM Card */
  .crm-card {
    background: white;
    border-radius: 12px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
    transition: all 0.2s;
  }
  .crm-card.decided-adopt { border-left: 4px solid #22c55e; }
  .crm-card.decided-modify { border-left: 4px solid #3b82f6; }
  .crm-card.decided-skip { border-left: 4px solid #9ca3af; }

  .crm-header {
    padding: 16px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    user-select: none;
  }
  .crm-header:hover { background: #faf8f5; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-day {
    background: #FF6B35;
    color: white;
  }
  .badge-alimtalk {
    background: #fff3ec;
    color: #D4540A;
  }
  .badge-friendtalk {
    background: #fde8e8;
    color: #cc4444;
  }

  .crm-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    flex: 1;
  }
  .crm-psych {
    font-size: 13px;
    color: #888;
    font-weight: 400;
  }

  .crm-toggle {
    font-size: 18px;
    color: #999;
    transition: transform 0.2s;
  }
  .crm-card.open .crm-toggle { transform: rotate(180deg); }

  .crm-body {
    display: none;
    padding: 0 24px 20px;
  }
  .crm-card.open .crm-body { display: block; }

  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 16px;
  }
  @media (max-width: 768px) {
    .compare-grid { grid-template-columns: 1fr; }
  }

  .col-label {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .col-label.before { color: #dc2626; }
  .col-label.after { color: #16a34a; }

  .before-col {
    background: #fff;
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: #444;
  }

  .after-col {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    min-height: 120px;
    outline: none;
    transition: outline 0.2s;
  }
  .after-col:focus {
    outline: 2px solid #22c55e;
  }

  /* Decision bar */
  .decision-bar {
    display: flex;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid #eee;
  }
  .decision-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .decision-btn.adopt { color: #16a34a; border-color: #bbf7d0; }
  .decision-btn.adopt:hover, .decision-btn.adopt.selected { background: #22c55e; color: white; border-color: #22c55e; }
  .decision-btn.modify { color: #2563eb; border-color: #bfdbfe; }
  .decision-btn.modify:hover, .decision-btn.modify.selected { background: #3b82f6; color: white; border-color: #3b82f6; }
  .decision-btn.skip { color: #6b7280; border-color: #d1d5db; }
  .decision-btn.skip:hover, .decision-btn.skip.selected { background: #9ca3af; color: white; border-color: #9ca3af; }

  /* Share button */
  #team-share-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: #22c55e; color: white; border: none; border-radius: 12px;
    padding: 14px 24px; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(34,197,94,0.4);
    transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  #team-share-btn:hover { background: #16a34a; }

  .hidden { display: none !important; }

  /* 수정필요 토글 */
  .modify-toggle { display: flex; align-items: center; gap: 6px; }
  .modify-toggle label { font-size: 12px; color: #888; cursor: pointer; user-select: none; }
  .modify-toggle input[type="checkbox"] { display: none; }
  .modify-toggle .toggle-switch {
    width: 36px; height: 20px; background: #ddd; border-radius: 20px;
    position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .modify-toggle .toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; background: white; border-radius: 50%; transition: left 0.2s;
  }
  .modify-toggle input:checked + .toggle-switch { background: #f59e0b; }
  .modify-toggle input:checked + .toggle-switch::after { left: 18px; }
  .modify-toggle input:checked ~ label { color: #f59e0b; font-weight: 600; }
  .crm-card.needs-modify { border-left: 4px solid #f59e0b !important; background: #fffdf5; }
  .crm-card.needs-modify .crm-header { background: #fffbec; }

  /* 플로팅 수정필요 전체토글 버튼 */
  #float-modify-btn {
    display: block; position: fixed; bottom: 80px; left: 24px; z-index: 999;
    padding: 10px 20px; background: #f59e0b; color: white; border: none;
    border-radius: 24px; font-size: 13px; font-weight: 700; cursor: pointer;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25); white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
  }
  #float-modify-btn.all-on { background: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <h1>메아리셋 12주 알림톡 CRM</h1>
  <p>배송완료 기점 · 주단위 자동 발송 · 알림톡 12개 + 친구톡 1개</p>
</div>

<div class="container">

  <!-- Overview Cards -->
  <div class="overview-grid">
    <div class="overview-card">
      <div class="num">13</div>
      <div class="label">총 메시지 수<br><small>알림톡 12 + 친구톡 1</small></div>
    </div>
    <div class="overview-card">
      <div class="num">D+0</div>
      <div class="label">트리거<br><small>카페24 배송완료</small></div>
    </div>
    <div class="overview-card">
      <div class="num">12주</div>
      <div class="label">기간<br><small>D+0 ~ D+84</small></div>
    </div>
    <div class="overview-card">
      <div class="num">13원</div>
      <div class="label">알림톡 단가<br><small>친구톡 25원/건</small></div>
    </div>
  </div>

  <!-- Decision Overview -->
  <div class="decision-overview" id="decision-summary">
    <div class="label">채택률 현황</div>
    <div class="counts">
      <span><span class="dot green"></span> 채택 <b id="count-adopt">0</b></span>
      <span><span class="dot blue"></span> 수정 <b id="count-modify">0</b></span>
      <span><span class="dot gray"></span> 보류 <b id="count-skip">0</b></span>
    </div>
    <button class="decision-btn" onclick="exportDecisions()" style="margin-left:auto;">📋 결과 복사</button>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <button onclick="toggleAll(true)">전체 펼치기</button>
    <button onclick="toggleAll(false)">전체 접기</button>
  </div>

  <!-- CRM Cards -->
  <div id="crm-cards"></div>

</div>

<button id="team-share-btn">팀 공유 저장</button>

<script>
const CRM_DATA = [
  { day: 0, type: "alimtalk", title: "노트 도착 — 90일 후의 나에게 편지", psych: "구매 직후 몰입 · 자기선언 효과", before: `#{고객명}님, 메아리셋 노트가 도착했어요.\n\n본격적으로 쓰기 전에, 딱 하나만 먼저 해주세요.\n\n📖 메아리셋 노트의 4~5페이지를 펴세요\n90일 후의 나에게 편지를 써보세요.\n지금 느끼는 것, 이루고 싶은 것, 솔직하게.\n\n손으로 직접 적는 게 중요해요.\n목표를 손으로 적은 사람은 그렇지 않은 사람보다 이룰 확률이 42% 높습니다.\n\n적으면 사진 찍어서 등록해주세요.\n3개월 뒤, 이 편지가 카톡으로 돌아옵니다.\n\n✅ 이미 등록하셨다면, 준비 완료!\n다음 주부터 매주 기록 가이드가 카톡으로 도착해요.\n\n📌 앞으로 12주간 매주 한 통씩,\n기록이 막힐 때 딱 맞는 타이밍에 도착하는 메시지를 보내드릴게요.\n작심삼일 넘기는 법, 슬럼프 탈출법, 기록이 쌓이면 보이는 것들까지.\n혼자 쓰면 3주, 함께하면 12주.` },
  { day: 7, type: "alimtalk", title: "에코 트라이앵글 — 13칸 만다라트", psych: "진입장벽 낮추기 · 사회적 증거(오타니)", before: `{고객명}님, 오타니 쇼헤이 아시죠?\n고1 때 종이에 "8구단 드래프트 1순위"를 적었어요.\n10년 뒤 진짜 이뤄집니다.\n\n근데 그가 쓴 만다라트는 64칸이에요.\n솔직히 64칸 채우다 포기한 적 없으세요?\n\n메아리셋은 13칸이면 돼요.\n큰 목표 1개, 핵심 방향 3개, 이번 분기 할 것 9개. 끝.\n\n📖 메아리셋 노트의 6~7페이지를 펴세요\n너무 완벽하게 적으려 하지 마세요.\n90일 동안 고치고, 바꾸고, 다시 적을 수 있어요.\n지금은 "일단 채우는 것"이 전부입니다.` },
  { day: 14, type: "alimtalk", title: "관제탑 설정 — 선택의 역설", psych: "선택 과부하 방지 · 결정 피로 감소", before: `{고객명}님, 요즘 뭘 해야 하는지 너무 많지 않나요?\n\n재밌는 실험이 있어요.\n사람들에게 선택지를 6개 줬을 때보다 24개를 줬을 때, 오히려 아무것도 안 고르는 비율이 10배 높았대요.\n\n선택지가 많으면 뇌가 지쳐서 "그냥 안 해"를 선택하는 거예요.\n\n📖 메아리셋 노트의 8~9페이지를 펴세요\n습관 / 관계 / 건강 / 경제 / 배움.\n5개 중 3개만 고르세요.\n\n핵심은 "뭘 할까"보다 "뭘 안 할까"를 먼저 정하는 거예요.\n나머지 2개는 이번 분기 안 해도 됩니다.\n진짜로요.` },
  { day: 21, type: "alimtalk", title: "C.E.O 시스템 — 주간 기록 시작", psych: "자이가르닉 효과 · 인지 부하 해소", before: `{고객명}님, 혹시 할 일 목록에 20개 적어놓고\n5개만 하고 자책한 적 있으세요?\n\n그거, 당신 의지력 문제가 아니에요.\n목록이 잘못 만들어진 거예요.\n\n못 끝낸 일은 머릿속에 계속 남아서 에너지를 먹어요.\n잠을 자도 개운하지 않고, 쉬어도 쉰 것 같지 않죠.\n근데 종이에 적어두는 순간, 뇌가 "저장했으니 이제 놓자"고 판단해요.\n\n📖 메아리셋 노트의 주간 페이지를 펴세요 (10p~)\n핵심(Core) 3개, 실행(Execute) 3개, 비울 것(Offload) 6개.\n줄여서 C.E.O 시스템이에요.\n핵심 3개만 끝내면 오늘은 이긴 거예요.\n나머지는 내려놓으세요.` },
  { day: 28, type: "alimtalk", title: "1개월 체크 — 습관 형성의 진실", psych: "기대치 리셋 · 실행의도(when-then)", before: `{고객명}님, 한 달이 됐어요.\n\n솔직히 물어볼게요.\n혹시 슬슬 귀찮아지기 시작했나요?\n\n그렇다면 정상이에요.\n"21일이면 습관이 된다"는 건 사실이 아니거든요.\n실제로는 평균 66일이 걸려요.\n\n📖 메아리셋 노트의 관제탑(8~9p) 우측 하단에 루틴 체크가 있어요.\n습관 3개만 정해서 매일 체크해보세요.` },
  { day: 35, type: "alimtalk", title: "브레인 덤프 — 머릿속 비우기", psych: "인지 오프로딩 · 스트레스 감소", before: `{고객명}님, 머릿속이 복잡한데 정리하려 할수록 더 꼬인 적 없으세요?\n\n그럴 땐 정리하지 마세요.\n그냥 다 꺼내세요.\n\n📖 메아리셋 노트의 20~21페이지를 펴세요\n타이머 10분 맞추고, 판단 없이 그냥 쓰세요.` },
  { day: 42, type: "alimtalk", title: "중간 점검 — 슬럼프는 정상", psych: "자기 연민 · 중간 리셋 효과", before: `{고객명}님, 이 시점에 가장 많이 드는 생각 아세요?\n"처음만큼 열심히 못 하고 있는데..."\n\n맞아요. 이 시기가 제일 힘들어요.\n근데 괜찮아요.\n\n📖 메아리셋 노트의 22~23페이지를 펴세요\n잘한 것 / 아쉬운 것 / 바꿀 것. 3가지만.` },
  { day: 49, type: "alimtalk", title: "기록의 복리 — 패턴 발견", psych: "자기 인식 강화 · 복리 메타포", before: `{고객명}님, 노트를 받은 지 49일이 됐어요.\n주간 페이지를 처음부터 쭉 넘겨보세요.\n\n뭔가 보이기 시작할 거예요. 이게 기록의 복리입니다.` },
  { day: 56, type: "alimtalk", title: "영감 보관소 — 흩어진 영감 모으기", psych: "큐레이션 본능 · 자기 정체성 발견", before: `{고객명}님, 이번엔 기록 얘기 말고 다른 얘기 할게요.\n\n최근에 "오 이거 좋다" 했던 거 있으세요?\n📖 메아리셋 노트의 60~61페이지, "영감 보관소"에 적어두세요.` },
  { day: 63, type: "alimtalk", title: "전략적 쉼 — 충전이 필요한 시점", psych: "에너지 관리 · 번아웃 예방", before: `{고객명}님, 솔직히 말할게요.\n혹시 슬슬 지치기 시작했다면, 이 메시지가 타이밍일 거예요.\n\n쉬는 게 게으른 게 아니에요.\n📖 노트 34~35페이지를 펴세요.` },
  { day: 70, type: "alimtalk", title: "마침표 하나 — 마무리 집중", psych: "완결 욕구 · 목표 좁히기", before: `{고객명}님, 90일 중 70일이 지났어요.\n\n딱 하나만. 이번 분기가 끝나기 전에 꼭 끝내고 싶은 것.\n그 하나가 마침표예요.` },
  { day: 77, type: "alimtalk", title: "회고 준비 — 마지막 주 예고", psych: "피크엔드 법칙 · 회고 프라이밍", before: `{고객명}님, 다음 주면 마지막 주예요.\n\n📖 노트 48~49페이지를 미리 살펴보세요.\n가장 뿌듯했던 순간, 힘들었던 순간, 이어갈 것.` },
  { day: 84, type: "friendtalk", title: "90일의 메아리 — 다음 시즌으로", psych: "프레시 스타트 효과 · 정체성 각인", before: `{고객명}님.\n\n거의 90일이에요. 한 줄이라도 적은 날이 있다면, 그게 다 메아리예요.\n\n📖 50페이지, 마지막 페이지를 펴세요.\n"다음 90일의 나에게" 딱 한 줄.` },
];

const BRAND = "meariset";
const API_BASE = "https://hyunvis.vercel.app/api/alimtalk-save";
const decisions = {};

// Render CRM cards
function renderCards() {
  const container = document.getElementById('crm-cards');
  container.innerHTML = CRM_DATA.map((msg, i) => {
    const num = i + 1;
    const ceId = `ce_${i + 10}`;
    const campaignId = `crm-${num}`;
    const typeBadge = msg.type === 'friendtalk'
      ? '<span class="badge badge-friendtalk">친구톡</span>'
      : '<span class="badge badge-alimtalk">알림톡</span>';
    const beforeHtml = msg.before.replace(/\n/g, '<br>');

    return `
    <div class="crm-card" data-campaign="${campaignId}">
      <div class="crm-header" onclick="toggleCard(this.parentElement)">
        <span class="badge badge-day">D+${msg.day}</span>
        ${typeBadge}
        <span class="crm-title">${num}. ${msg.title}</span>
        <span class="crm-psych">${msg.psych}</span>
        <div class="modify-toggle" onclick="event.stopPropagation()" style="margin-left:auto;">
          <input type="checkbox" id="modify-${campaignId}" onchange="toggleModify('${campaignId}', this, event)">
          <span class="toggle-switch" onclick="event.stopPropagation(); document.getElementById('modify-${campaignId}').click();"></span>
          <label for="modify-${campaignId}" onclick="event.stopPropagation()">수정필요</label>
        </div>
        <span class="crm-toggle">▼</span>
      </div>
      <div class="crm-body">
        <div class="compare-grid">
          <div>
            <div class="col-label before">❌ 현재 (BEFORE)</div>
            <div class="before-col" id="before-crm-${num}">${beforeHtml}</div>
          </div>
          <div>
            <div class="col-label after">✅ 개선안 (AFTER)</div>
            <div class="after-col" contenteditable="true" id="${ceId}"></div>
          </div>
        </div>
        <div class="decision-bar" onclick="event.stopPropagation()">
          <button class="decision-btn adopt" onclick="decide('${campaignId}','adopt')">채택</button>
          <button class="decision-btn modify" onclick="decide('${campaignId}','modify')">수정</button>
          <button class="decision-btn skip" onclick="decide('${campaignId}','skip')">보류</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.crm-card').forEach(c => {
    if (open) c.classList.add('open');
    else c.classList.remove('open');
  });
}

function toggleModify(campaignId, checkbox, event) {
  event.stopPropagation();
  const card = document.querySelector('[data-campaign="' + campaignId + '"]');
  if (checkbox.checked) card.classList.add('needs-modify');
  else card.classList.remove('needs-modify');
  localStorage.setItem('alimtalk_meariset_modify_' + campaignId, checkbox.checked ? '1' : '0');
}

function toggleAllModify() {
  const checkboxes = document.querySelectorAll("input[id^=modify-crm]");
  const allOn = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => {
    if (allOn && cb.checked) cb.click();
    else if (!allOn && !cb.checked) cb.click();
  });
  const newState = !allOn;
  const fb = document.getElementById("float-modify-btn");
  if (fb) {
    fb.textContent = newState ? "☒ 전체 OFF" : "☑ 수정필요 전체 ON";
    fb.classList.toggle("all-on", newState);
  }
}

function decide(campaignId, type) {
  decisions[campaignId] = type;
  localStorage.setItem(`meariset_decisions`, JSON.stringify(decisions));

  const card = document.querySelector(`[data-campaign="${campaignId}"]`);
  if (!card) return;

  card.classList.remove('decided-adopt', 'decided-modify', 'decided-skip');
  card.classList.add('decided-' + type);

  card.querySelectorAll('.decision-btn').forEach(b => b.classList.remove('selected'));
  card.querySelector(`.decision-btn.${type}`).classList.add('selected');

  if (type === 'modify') {
    const editable = card.querySelector('[contenteditable]');
    if (editable) editable.focus();
  }

  updateSummary();
}

function updateSummary() {
  const vals = Object.values(decisions);
  document.getElementById('count-adopt').textContent = vals.filter(v => v === 'adopt').length;
  document.getElementById('count-modify').textContent = vals.filter(v => v === 'modify').length;
  document.getElementById('count-skip').textContent = vals.filter(v => v === 'skip').length;
}

function exportDecisions() {
  let result = '# 메아리셋 12주 CRM — 채택 결과\n\n';
  result += `날짜: ${new Date().toLocaleDateString('ko-KR')}\n\n`;

  document.querySelectorAll('[data-campaign]').forEach(card => {
    const id = card.dataset.campaign;
    const titleEl = card.querySelector('.crm-title');
    const name = titleEl ? titleEl.textContent : id;
    const status = decisions[id] || '미결정';
    const emoji = status === 'adopt' ? '✅' : status === 'modify' ? '✏️' : status === 'skip' ? '⏭️' : '⬜';
    const label = status === 'adopt' ? '채택' : status === 'modify' ? '수정 채택' : status === 'skip' ? '보류' : '미결정';

    result += `${emoji} ${name} — ${label}\n`;

    if ((status === 'modify' || status === 'adopt')) {
      const afterText = card.querySelector('.after-col[contenteditable]');
      if (afterText && afterText.innerText.trim()) {
        result += `> ${afterText.innerText.substring(0, 200).replace(/\n/g, '\n> ')}...\n`;
      }
    }
    result += '\n';
  });

  navigator.clipboard.writeText(result).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// Init
renderCards();

// Restore decisions from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('meariset_decisions') || '{}');
  Object.entries(saved).forEach(([k, v]) => decide(k, v));
} catch {}

document.addEventListener('DOMContentLoaded', function() {
  // Stop propagation on interactive elements
  document.querySelectorAll('[contenteditable="true"], .decision-bar').forEach(el => {
    el.addEventListener('click', e => e.stopPropagation());
  });

  const editables = document.querySelectorAll('[contenteditable="true"]');

  // Load team data from GitHub API
  async function loadTeamData() {
    try {
      const res = await fetch(`${API_BASE}?brand=${BRAND}`, { cache: 'no-store' });
      if (!res.ok) return;
      const data = await res.json();
      editables.forEach((el, idx) => {
        const key = `ce_${idx + 10}`;
        if (data[key]) el.innerHTML = data[key];
        else {
          const local = localStorage.getItem(`alimtalk_${BRAND}_${key}`);
          if (local) el.innerHTML = local;
        }
      });
    } catch {
      editables.forEach((el, idx) => {
        const key = `ce_${idx + 10}`;
        const s = localStorage.getItem(`alimtalk_${BRAND}_${key}`);
        if (s) el.innerHTML = s;
      });
    }
  }

  loadTeamData();
    // 수정필요 토글 상태 복원
    document.querySelectorAll("input[id^=modify-crm]").forEach(cb => {
      const campaignId = cb.id.replace('modify-', '');
      const saved = localStorage.getItem('alimtalk_meariset_modify_' + campaignId);
      if (saved === '1' && !cb.checked) cb.click();
    });


  // Auto-save to localStorage on typing
  editables.forEach((el, idx) => {
    el.addEventListener('input', () => {
      const key = `ce_${idx + 10}`;
      localStorage.setItem(`alimtalk_${BRAND}_${key}`, el.innerHTML);
      el.style.outline = "2px solid #22c55e";
      clearTimeout(el._saveTimer);
      el._saveTimer = setTimeout(() => { el.style.outline = ""; }, 800);
    });
  });

  // Team share button
  const shareBtn = document.getElementById('team-share-btn');

  shareBtn.addEventListener('click', async () => {
    shareBtn.disabled = true;
    shareBtn.textContent = '저장 중...';
    shareBtn.style.background = '#9ca3af';

    const changes = {};
    editables.forEach((el, idx) => { changes[`ce_${idx + 10}`] = el.innerHTML; });

    try {
      const res = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ brand: BRAND, changes }),
      });
      if (res.ok) {
        shareBtn.textContent = '✅ 저장 완료!';
        shareBtn.style.background = '#22c55e';
        setTimeout(() => {
          shareBtn.textContent = '팀 공유 저장';
          shareBtn.disabled = false;
        }, 2000);
      } else {
        throw new Error('save failed');
      }
    } catch {
      shareBtn.textContent = '❌ 저장 실패';
      shareBtn.style.background = '#ef4444';
      setTimeout(() => {
        shareBtn.textContent = '팀 공유 저장';
        shareBtn.style.background = '#22c55e';
        shareBtn.disabled = false;
      }, 2000);
    }
  });
});
</script>

<button id="float-modify-btn" onclick="toggleAllModify()">☑ 수정필요 전체 ON</button>
</body>
</html>
