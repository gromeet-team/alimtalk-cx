<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알림톡 CX 개선안 — 그로밋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #0f1117; }

  .top-bar {
    background: #0f1117;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-right: 16px;
    opacity: 0.9;
  }

  .brand-tab {
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    background: transparent;
    transition: all 0.2s;
  }
  .brand-tab:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.3); }
  .brand-tab.active-foremong { background: #4a7c28; border-color: #4a7c28; color: #fff; }
  .brand-tab.active-uvid { background: #0284c7; border-color: #0284c7; color: #fff; }

  .frame-wrap {
    width: 100%;
    height: calc(100vh - 52px);
  }
  .frame-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<div class="top-bar">
  <span class="logo">🌿 알림톡 CX 개선안</span>
  <button class="brand-tab active-foremong" onclick="switchBrand('foremong')">🌿 Foremong</button>
  <button class="brand-tab" onclick="switchBrand('uvid')">☀️ UVID</button>
</div>

<div class="frame-wrap">
  <iframe id="brand-frame" src="foremong.html" title="알림톡 캠페인"></iframe>
</div>

<script>
  const tabs = document.querySelectorAll('.brand-tab');
  function switchBrand(brand) {
    document.getElementById('brand-frame').src = brand + '.html';
    tabs.forEach(t => t.className = 'brand-tab');
    event.target.classList.add('active-' + brand);
  }
</script>
</body>
</html>
